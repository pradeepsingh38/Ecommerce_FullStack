# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username=root
spring.datasource.password=0987

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8081

# JWT — secret must be at least 32 characters
jwt.secret=ecommerceSecretKey2024SuperSecureLongString
jwt.expiration=86400000

# Single admin account for direct sign in
app.admin.name=Admin
app.admin.email=admin@gmail.com
app.admin.password=admin123

# Mail / OTP
# For Gmail, use an app password, not your normal Gmail password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}
